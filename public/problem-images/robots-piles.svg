<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360"><rect width="900" height="360" fill="#fffdf7"/><text x="30" y="42" font-family="Arial" font-size="28" font-weight="700">Charge totale des piles</text><text x="30" y="85" font-family="Arial" font-size="18">Capacité maximale : 500 unités</text><g transform="translate(90 140)"><rect width="700" height="70" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="3"/><g fill="#f59e0b" stroke="#92400e"><rect x="0" y="0" width="70" height="70"/><rect x="70" y="0" width="70" height="70"/><rect x="140" y="0" width="70" height="70"/><rect x="210" y="0" width="70" height="70"/></g><g stroke="#94a3b8"><line x1="350" y1="0" x2="350" y2="70"/><line x1="420" y1="0" x2="420" y2="70"/><line x1="490" y1="0" x2="490" y2="70"/><line x1="560" y1="0" x2="560" y2="70"/><line x1="630" y1="0" x2="630" y2="70"/></g></g><text x="80" y="245" font-family="Arial" font-size="17">À l’arrivée : 2/5 de 500 unités restent.</text><text x="80" y="280" font-family="Arial" font-size="17">Objectif : recharger les piles jusqu’à 90 %.</text></svg>